<!DOCTYPE html><html lang="en"><head>  <meta charset="UTF-8" /><meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

  <title>Create Account - Quavron</title>  <link
    rel="stylesheet"
    href="/css/style.css"
  /></head><body class="auth-page">  <div class="auth-container"><div class="auth-card">

  <div class="auth-logo">
    Quavron
  </div>

  <h1>
    Create Account
  </h1>

  <p>
    Start building your next project with Quavron.
  </p>

  <form class="auth-form">

    <input
      type="text"
      placeholder="Full Name"
      required
    />

    <input
      type="email"
      placeholder="Email Address"
      required
    />

    <input
      type="password"
      placeholder="Password"
      required
    />

    <input
      type="password"
      placeholder="Confirm Password"
      required
    />

    <button type="submit">
      Create Account
    </button>

  </form>

  <div class="auth-links">

    <a href="/login">
      Already have an account?
    </a>

  </div>

</div>

  </div>  <script src="/js/main.js"></script></body></html>
