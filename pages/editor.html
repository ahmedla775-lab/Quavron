<!DOCTYPE html><html lang="en"><head>  <meta charset="UTF-8" /><meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

  <title>Quavron Editor</title>  <link
    rel="stylesheet"
    href="/css/style.css"
  /></head><body class="editor-page">  <!-- ========================================
       TOP NAVBAR
  ========================================= -->  <header class="topbar"><div class="topbar-left">

  <div class="logo">
    Quavron
  </div>

  <button class="top-btn">
    Explorer
  </button>

  <button class="top-btn">
    Projects
  </button>

  <button class="top-btn">
    Marketplace
  </button>

</div>

<div class="topbar-center">

  <input
    type="text"
    placeholder="Search files, commands..."
    class="search-bar"
  />

</div>

<div class="topbar-right">

  <select class="language-switcher">

    <option>EN</option>
    <option>AR</option>
    <option>FR</option>
    <option>ES</option>
    <option>RU</option>
    <option>DE</option>
    <option>IT</option>
    <option>ZH</option>

  </select>

  <button class="run-btn">
    ▶ Run
  </button>

  <button class="save-btn">
    💾 Save
  </button>

  <button class="ai-btn">
    🤖 AI
  </button>

</div>

  </header>  <!-- ========================================
       MAIN EDITOR AREA
  ========================================= -->  <main class="editor-layout"><!-- ========================================
     SIDEBAR
========================================= -->

<aside class="sidebar">

  <div class="sidebar-title">
    Explorer
  </div>

  <ul class="file-tree">

    <li>📁 src</li>

    <li>📁 components</li>

    <li>📁 pages</li>

    <li>📄 index.html</li>

    <li>📄 style.css</li>

    <li>📄 app.js</li>

    <li>📄 package.json</li>

  </ul>

</aside>

<!-- ========================================
     EDITOR SECTION
========================================= -->

<section class="editor-section">

  <!-- TABS -->

  <div class="editor-tabs">

    <div class="tab active-tab">
      index.html
    </div>

    <div class="tab">
      style.css
    </div>

    <div class="tab">
      app.js
    </div>

  </div>

  <!-- MONACO PLACEHOLDER -->

  <div class="editor-container">

    <textarea
      class="code-editor"
    >

<!DOCTYPE html><html><head>
  <title>Quavron</title>
</head><body>  <h1>Hello from Quavron IDE 🚀</h1></body></html>
        </textarea>  </div>

</section>

  </main>  <!-- ========================================
       TERMINAL
  ========================================= -->  <section class="terminal-section"><div class="terminal-header">
  Terminal
</div>

<div class="terminal-body">

  <p>
    > Quavron Terminal Ready...
  </p>

  <p>
    > npm run dev
  </p>

</div>

  </section>  <!-- ========================================
       JS FILES
  ========================================= -->  <script src="/js/editor.js"></script></body></html>
