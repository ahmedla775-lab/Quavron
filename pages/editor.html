<!DOCTYPE html><html lang="en"><head>  <meta charset="UTF-8" /><meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

  <title>Quavron IDE</title>  <link
    rel="stylesheet"
    href="/css/style.css"
  />  <!-- Monaco Editor CDN -->  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script></head><body>  <div class="editor-layout"><!-- Sidebar -->

<aside class="editor-sidebar">

  <div class="editor-logo">
    Quavron IDE
  </div>

  <div class="file-explorer">

    <div class="file-item">
      index.html
    </div>

    <div class="file-item">
      style.css
    </div>

    <div class="file-item">
      main.js
    </div>

  </div>

</aside>

<!-- Main -->

<main class="editor-main">

  <!-- Topbar -->

  <div class="editor-topbar">

    <button id="run-btn">
      Run
    </button>

    <button id="save-btn">
      Save
    </button>

    <button id="deploy-btn">
      Deploy
    </button>

  </div>

  <!-- Monaco Editor -->

  <div id="editor"></div>

</main>

  </div>  <script src="/js/editor.js"></script></body></html>
